version: "3.9"

services:
  db:
    image: mysql:9.6
    container_name: ai_resume_matcher_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_resume_matcher
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: ai_resume_matcher_app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data: